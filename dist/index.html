<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>极简会议 — 一键召集，即刻开会</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1e293b;--bg4:#334155;
  --text:#fff;--text2:#94a3b8;--text3:#64748b;--text4:#475569;
  --blue:#3b82f6;--blue2:#2563eb;--purple:#8b5cf6;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  --radius:12px;--radius-sm:8px;
}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{min-height:100vh}

/* Shared components */
.btn{padding:12px 24px;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;box-shadow:0 4px 16px rgba(59,130,246,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(59,130,246,.4)}
.btn-primary:disabled{background:var(--bg4);box-shadow:none;transform:none;cursor:not-allowed;color:var(--text3)}
.btn-secondary{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text2)}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:var(--radius-sm)}
.btn-icon{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s;color:#fff;background:rgba(255,255,255,.08)}
.btn-icon:hover{background:rgba(255,255,255,.15)}
.btn-icon.active{background:var(--blue)}
.btn-icon.danger{background:rgba(239,68,68,.3)}
.btn-icon.danger:hover{background:var(--red)}

.input{width:100%;padding:13px 16px;background:rgba(15,23,42,.6);border:1px solid var(--bg4);border-radius:var(--radius);color:#fff;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.input::placeholder{color:var(--text4)}

.card{background:rgba(30,41,59,.5);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:24px}
.card-glass{background:rgba(30,41,59,.8);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px;box-shadow:0 25px 60px rgba(0,0,0,.4)}
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:var(--radius);padding:10px 14px;color:#fca5a5;font-size:13px;margin-bottom:20px}
.success-box{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);border-radius:var(--radius);padding:10px 14px;color:#86efac;font-size:13px;margin-bottom:20px}

.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-green{background:rgba(34,197,94,.1);color:var(--green)}
.badge-gray{background:rgba(100,116,139,.15);color:var(--text3)}

/* Page layouts */
.page-center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.page-full{min-height:100vh;display:flex;flex-direction:column}
.auth-card{width:420px;max-width:100%}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 32px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;cursor:pointer}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px}

/* Landing */
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:20px;padding:6px 16px;font-size:13px;color:#93c5fd}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.hero-title{font-size:56px;font-weight:800;line-height:1.1;background:linear-gradient(135deg,#fff,var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:18px;color:var(--text3);line-height:1.7;max-width:480px;margin:0 auto}
.feature-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;max-width:800px;margin:0 auto}
.feature-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:20px;text-align:center}
.feature-icon{font-size:28px;margin-bottom:8px}
.feature-title{font-size:14px;font-weight:600;margin-bottom:4px}
.feature-desc{font-size:12px;color:var(--text3)}

/* Dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.dash-card{background:rgba(30,41,59,.3);border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);padding:18px;text-align:center}
.dash-card .dash-icon{font-size:24px;margin-bottom:6px}
.dash-card .dash-title{font-size:13px;font-weight:600;margin-bottom:2px}
.dash-card .dash-desc{font-size:11px;color:var(--text4)}
.meeting-row{background:rgba(30,41,59,.3);border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);padding:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}

/* Meeting Room */
.meeting-video-area{flex:1;display:flex;flex-wrap:wrap;gap:12px;padding:16px;overflow-y:auto;align-content:flex-start;justify-content:center}
.video-container{position:relative;background:#000;border-radius:var(--radius);overflow:hidden;min-width:280px;max-width:480px;flex:1 1 320px;aspect-ratio:4/3}
.video-container video{width:100%;height:100%;object-fit:cover}
.video-label{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.6);color:#fff;padding:2px 10px;border-radius:6px;font-size:12px}
.control-bar{display:flex;justify-content:center;gap:16px;padding:16px 24px;background:rgba(15,23,42,.95);border-top:1px solid rgba(255,255,255,.06);flex-wrap:wrap}
.meeting-header{padding:12px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.06);font-size:14px}
.meeting-header .meeting-info{display:flex;align-items:center;gap:12px}
.meeting-header .meeting-link-copy{cursor:pointer;color:var(--text2);font-size:12px;background:rgba(255,255,255,.05);padding:4px 10px;border-radius:6px;display:flex;align-items:center;gap:4px}

/* Chat sidebar */
.chat-panel{position:fixed;right:0;top:0;bottom:0;width:320px;background:rgba(15,23,42,.98);border-left:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;z-index:100;transform:translateX(100%);transition:transform .3s}
.chat-panel.open{transform:translateX(0)}
.chat-messages{flex:1;overflow-y:auto;padding:16px}
.chat-input-area{padding:12px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:8px}
.chat-msg{margin-bottom:12px}
.chat-msg .sender{font-size:11px;color:var(--text3);margin-bottom:2px}
.chat-msg .text{font-size:13px;background:rgba(59,130,246,.1);padding:8px 12px;border-radius:var(--radius-sm);display:inline-block;max-width:100%;word-break:break-word}

/* Participant list */
.participant-list{position:fixed;right:0;top:0;bottom:0;width:280px;background:rgba(15,23,42,.98);border-left:1px solid rgba(255,255,255,.06);z-index:100;transform:translateX(100%);transition:transform .3s;overflow-y:auto}
.participant-list.open{transform:translateX(0)}

/* Mobile responsive */
@media(max-width:768px){
  .hero-title{font-size:36px}
  .hero-desc{font-size:15px}
  .dash-grid{grid-template-columns:1fr}
  .control-bar{gap:8px;padding:12px}
  .btn-icon{width:40px;height:40px;font-size:17px}
  .header{padding:12px 16px}
  .video-container{min-width:100%;max-width:100%}
}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s infinite}

.hidden{display:none!important}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   极简会议 v2.0 — 完整前端 + P2P WebRTC
   架构：SPA hash路由 + localStorage数据 + BroadcastChannel信令
   ============================================================ */

// ─── Store (localStorage) ───────────────────────────────────
const Store = {
  get(key, fallback = null) {
    try { const v = localStorage.getItem('jm_' + key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  set(key, val) { localStorage.setItem('jm_' + key, JSON.stringify(val)); },
  remove(key) { localStorage.removeItem('jm_' + key); }
};

// ─── Auth ───────────────────────────────────────────────────
const Auth = {
  getToken() { return Store.get('token'); },
  getUser() { return Store.get('user'); },
  setSession(token, user) { Store.set('token', token); Store.set('user', user); },
  logout() { Store.remove('token'); Store.remove('user'); },
  isLoggedIn() { return !!this.getToken(); },
  register(email, password) {
    const users = Store.get('users', {});
    if (users[email]) return { ok: false, error: '该邮箱已注册' };
    if (password.length < 6) return { ok: false, error: '密码至少6位' };
    const id = 'u_' + Date.now();
    users[email] = { id, email, password };
    Store.set('users', users);
    const token = 'tok_' + id + '_' + Date.now();
    this.setSession(token, { id, email });
    return { ok: true, token, user: { id, email } };
  },
  login(email, password) {
    const users = Store.get('users', {});
    const user = users[email];
    if (!user || user.password !== password) return { ok: false, error: '邮箱或密码错误' };
    const token = 'tok_' + user.id + '_' + Date.now();
    this.setSession(token, user);
    return { ok: true, token, user: { id: user.id, email: user.email } };
  }
};

// ─── Meetings ───────────────────────────────────────────────
const Meetings = {
  getAll() { return Store.get('meetings', []); },
  getByLink(link) { return this.getAll().find(m => m.link === link); },
  create(title, hostId) {
    const meetings = this.getAll();
    const id = 'm_' + Date.now();
    const link = generateLink();
    const meeting = {
      id, link, title: title || '未命名会议', hostId,
      createdAt: new Date().toISOString(), isEnded: false,
      participants: []
    };
    meetings.unshift(meeting);
    Store.set('meetings', meetings);
    return meeting;
  },
  getByHost(hostId) { return this.getAll().filter(m => m.hostId === hostId); },
  endMeeting(link) {
    const meetings = this.getAll();
    const m = meetings.find(x => x.link === link);
    if (m) { m.isEnded = true; m.endedAt = new Date().toISOString(); }
    Store.set('meetings', meetings);
    return m;
  },
  deleteMeeting(id) {
    const meetings = this.getAll().filter(m => m.id !== id);
    Store.set('meetings', meetings);
  },
  joinMeeting(link, name) {
    const meetings = this.getAll();
    const m = meetings.find(x => x.link === link);
    if (!m) return { ok: false, error: '会议不存在' };
    if (m.isEnded) return { ok: false, error: '该会议已结束，链接已失效' };
    if (m.participants.find(p => p.name === name)) return { ok: false, error: '该姓名已在此会议中' };
    const p = { id: 'p_' + Date.now(), name, joinedAt: new Date().toISOString() };
    m.participants.push(p);
    Store.set('meetings', meetings);
    return { ok: true, participant: p, meeting: m };
  },
  leaveMeeting(link, participantId) {
    const meetings = this.getAll();
    const m = meetings.find(x => x.link === link);
    if (m) { m.participants = m.participants.filter(p => p.id !== participantId); }
    Store.set('meetings', meetings);
  }
};

function generateLink() {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let s = '';
  for (let i = 0; i < 8; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

// ─── Router ─────────────────────────────────────────────────
const R = {
  current: null,
  params: {},
  navigate(hash) {
    window.location.hash = hash;
    this._render();
  },
  _parse() {
    const h = window.location.hash.slice(1) || '/';
    const [path, ...rest] = h.split('/');
    this.current = path;
    this.params = {};
    if (rest.length > 0 && path === 'join') this.params.link = rest[0];
    if (rest.length > 0 && path === 'meeting') this.params.link = rest[0];
  },
  _render() {
    this._parse();
    const app = document.getElementById('app');
    switch (this.current) {
      case '/': renderLanding(app); break;
      case 'login': renderLogin(app); break;
      case 'register': renderRegister(app); break;
      case 'dashboard': Auth.isLoggedIn() ? renderDashboard(app) : (R.navigate('/login'), null); break;
      case 'join': renderJoin(app); break;
      case 'meeting': renderMeeting(app); break;
      default: renderLanding(app);
    }
  },
  init() {
    window.addEventListener('hashchange', () => this._render());
    this._render();
  }
};

// ─── UI Components ──────────────────────────────────────────
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') e.className = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c instanceof Node) e.appendChild(c);
  }
  return e;
}

// ─── Landing Page ───────────────────────────────────────────
function renderLanding(app) {
  app.innerHTML = '';
  const bg = el('div', { style: { position: 'fixed', inset: 0, overflow: 'hidden', pointerEvents: 'none', zIndex: 0 } });
  bg.innerHTML = `
    <div style="position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.08) 0%,transparent 70%);top:-10%;right:-10%"></div>
    <div style="position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,0.06) 0%,transparent 70%);bottom:10%;left:-5%"></div>
  `;
  app.appendChild(bg);

  const wrap = el('div', { style: { position: 'relative', zIndex: 1, minHeight: '100vh', display: 'flex', flexDirection: 'column' } });

  // Nav
  const nav = el('div', { className: 'header' });
  nav.appendChild(el('div', { className: 'logo', onClick: () => R.navigate('/') },
    el('div', { className: 'logo-icon' }, '🎥'),
    '极简会议'
  ));
  const navBtns = el('div', { style: { display: 'flex', gap: '8px' } });
  navBtns.appendChild(el('button', { className: 'btn btn-secondary', onClick: () => R.navigate('/login') }, '登录'));
  navBtns.appendChild(el('button', { className: 'btn btn-primary', onClick: () => R.navigate('/register'), style: { padding: '8px 20px' } }, '注册'));
  nav.appendChild(navBtns);
  wrap.appendChild(nav);

  // Hero
  const hero = el('div', { style: { flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '40px 20px' } });
  const heroInner = el('div', { style: { textAlign: 'center', maxWidth: '640px' } });
  heroInner.innerHTML = `
    <div class="hero-badge" style="margin-bottom:32px"><span class="hero-dot"></span> 已就绪 · 免费使用</div>
    <h1 class="hero-title" style="margin-bottom:20px">一键召集<br>即刻开会</h1>
    <p class="hero-desc" style="margin-bottom:48px">零注册门槛 · 链接一次有效 · 3天自动清理<br>男女老少都能用，紧急时刻快人一步</p>
  `;
  const heroBtns = el('div', { style: { display: 'flex', gap: '16px', justifyContent: 'center', flexWrap: 'wrap' } });
  heroBtns.appendChild(el('button', { className: 'btn btn-primary', onClick: () => R.navigate('/register'), style: { padding: '16px 40px', fontSize: '16px' } }, '创建会议室'));
  heroBtns.appendChild(el('button', { className: 'btn btn-secondary', onClick: () => R.navigate('/login'), style: { padding: '16px 40px', fontSize: '16px' } }, '已有账号'));
  heroInner.appendChild(heroBtns);
  hero.appendChild(heroInner);
  wrap.appendChild(hero);

  // Features
  const features = el('div', { style: { padding: '40px 20px 60px', maxWidth: '800px', margin: '0 auto' } });
  const grid = el('div', { className: 'feature-grid' });
  [
    { icon: '🔗', title: '链接入会', desc: '点开链接输入姓名即可加入' },
    { icon: '🔒', title: '一次有效', desc: '会议结束链接永久销毁' },
    { icon: '🗑️', title: '3天清理', desc: '数据不留痕，隐私有保障' },
    { icon: '📹', title: '高清视频', desc: 'WebRTC P2P 端到端加密' },
    { icon: '📱', title: '全平台', desc: '手机/电脑/平板都能用' },
    { icon: '🆓', title: '完全免费', desc: '无需付费，永久免费' },
  ].forEach(f => {
    grid.appendChild(el('div', { className: 'feature-card' },
      el('div', { className: 'feature-icon' }, f.icon),
      el('div', { className: 'feature-title' }, f.title),
      el('div', { className: 'feature-desc' }, f.desc)
    ));
  });
  features.appendChild(grid);
  wrap.appendChild(features);

  // How to use
  const howto = el('div', { style: { padding: '0 20px 60px', maxWidth: '800px', margin: '0 auto' } });
  howto.innerHTML = `
    <h2 style="font-size:28px;font-weight:700;text-align:center;margin-bottom:8px">使用指南</h2>
    <p style="color:var(--text3);text-align:center;margin-bottom:32px;font-size:14px">三步上手，老少皆宜</p>
  `;
  const steps = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '20px' } });
  [
    { num: '01', title: '注册账号', desc: '点击右上角「注册」，输入邮箱和密码（至少6位）。注册后自动登录，进入控制台。' },
    { num: '02', title: '创建会议', desc: '在控制台点击「创建会议室」生成专属链接，点击「复制」即可将链接分享给任何人。' },
    { num: '03', title: '开始会议', desc: '参会者点击链接输入姓名即可加入。你作为主持人在控制台点击会议进入，双方即可视频通话。' },
  ].forEach(s => {
    steps.appendChild(el('div', { style: { display: 'flex', gap: '20px', background: 'rgba(255,255,255,0.03)', borderRadius: 'var(--radius)', padding: '24px', border: '1px solid rgba(255,255,255,0.06)' } },
      el('div', { style: { fontSize: '32px', fontWeight: 800, color: 'var(--blue)', minWidth: '48px' } }, s.num),
      el('div', {},
        el('div', { style: { fontSize: '16px', fontWeight: 600, marginBottom: '6px' } }, s.title),
        el('div', { style: { fontSize: '13px', color: 'var(--text3)', lineHeight: 1.6 } }, s.desc)
      )
    ));
  });
  howto.appendChild(steps);
  wrap.appendChild(howto);

  // Footer
  const footer = el('div', { style: { textAlign: 'center', padding: '20px', color: 'var(--text4)', fontSize: '12px', borderTop: '1px solid rgba(255,255,255,0.04)' } });
  footer.textContent = '极简会议 · 开源免费 · P2P端到端加密';
  wrap.appendChild(footer);

  app.appendChild(wrap);
}

// ─── Login Page ─────────────────────────────────────────────
function renderLogin(app) {
  app.innerHTML = '';
  const page = el('div', { className: 'page-center' });
  const card = el('div', { className: 'auth-card card-glass' });

  card.innerHTML = `
    <div style="text-align:center;margin-bottom:32px">
      <div class="logo" style="justify-content:center;margin-bottom:24px" onclick="location.hash='/'">
        <div class="logo-icon">🎥</div>
      </div>
      <h1 style="font-size:24px;font-weight:700;margin-bottom:6px">欢迎回来</h1>
      <p style="color:var(--text3);font-size:14px">登录进入会议控制台</p>
    </div>
  `;
  const form = el('form');
  form.onsubmit = (e) => { e.preventDefault(); doLogin(); };

  form.appendChild(el('label', { style: { color: 'var(--text2)', display: 'block', marginBottom: '8px', fontSize: '13px', fontWeight: 500 } }, '邮箱地址'));
  const emailInp = el('input', { type: 'email', className: 'input', placeholder: 'your@email.com', required: true, style: { marginBottom: '16px' } });
  form.appendChild(emailInp);

  form.appendChild(el('label', { style: { color: 'var(--text2)', display: 'block', marginBottom: '8px', fontSize: '13px', fontWeight: 500 } }, '密码'));
  const passInp = el('input', { type: 'password', className: 'input', placeholder: '输入密码', required: true, style: { marginBottom: '24px' } });
  form.appendChild(passInp);

  const errBox = el('div', { className: 'error-box hidden' });
  form.appendChild(errBox);

  const submitBtn = el('button', { type: 'submit', className: 'btn btn-primary', style: { width: '100%', padding: '14px', fontSize: '15px' } }, '登录');
  form.appendChild(submitBtn);

  card.appendChild(form);

// ─── Meeting Room (WebRTC P2P) ──────────────────────────────
function renderMeeting(app) {
  const link = R.params.link;
  const meeting = Meetings.getByLink(link);
  if (!meeting || meeting.isEnded) { R.navigate('/'); return; }

  const participant = Store.get('current_participant');
  const isHost = !!Auth.getUser() && Auth.getUser().id === meeting.hostId;
  const myName = participant ? participant.name : (isHost ? '主持人' : '参会者');
  const myId = participant ? participant.id : 'host';

  app.innerHTML = '';

  // State
  let localStream = null;
  let pcMap = new Map(); // peerId -> RTCPeerConnection
  let remoteStreams = new Map(); // peerId -> MediaStream
  let isMicOn = true;
  let isCameraOn = true;
  let isScreenSharing = false;
  let isRecording = false;
  let mediaRecorder = null;
  let recordedChunks = [];
  let chatMessages = [];
  let chatOpen = false;
  let participantsOpen = false;
  let bc = null; // BroadcastChannel

  // Build UI
  const page = el('div', { className: 'page-full', style: { background: '#000', minHeight: '100vh' } });

  // Meeting header
  const mh = el('div', { className: 'meeting-header' });
  mh.innerHTML = `
    <div class="meeting-info">
      <span style="font-weight:600">${meeting.title || '会议进行中'}</span>
      <span class="badge badge-green pulse">● 进行中</span>
    </div>
  `;
  const linkInfo = el('div', { style: 'display:flex;align-items:center;gap:12px' });
  linkInfo.appendChild(el('span', { className: 'meeting-link-copy', title: '复制会议链接' }, '📋 复制链接'));
  linkInfo.appendChild(el('span', { style: 'color:var(--text2);font-size:12px' }, `参会人: ${meeting.participants.length}`));
  mh.appendChild(linkInfo);
  linkInfo.querySelector('.meeting-link-copy').onclick = () => {
    const url = window.location.origin + window.location.pathname + '#/join/' + link;
    navigator.clipboard.writeText(url).then(() => { linkInfo.querySelector('.meeting-link-copy').textContent = '✅ 已复制'; setTimeout(() => linkInfo.querySelector('.meeting-link-copy').textContent = '📋 复制链接', 2000); });
  };
  page.appendChild(mh);

  // Video area
  const videoArea = el('div', { className: 'meeting-video-area' });
  const localVideo = el('video', { autoplay: true, muted: true, playsinline: true });
  const localContainer = el('div', { className: 'video-container' },
    localVideo,
    el('div', { className: 'video-label' }, `我 (${myName})`)
  );
  videoArea.appendChild(localContainer);
  page.appendChild(videoArea);

  // Control bar
  const controlBar = el('div', { className: 'control-bar' });
  const micBtn = el('button', { className: 'btn-icon active', title: '麦克风' }, '🎤');
  micBtn.onclick = () => {
    isMicOn = !isMicOn;
    if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = isMicOn);
    micBtn.className = 'btn-icon' + (isMicOn ? ' active' : '');
    micBtn.textContent = isMicOn ? '🎤' : '🔇';
  };
  controlBar.appendChild(micBtn);

  const camBtn = el('button', { className: 'btn-icon active', title: '摄像头' }, '📹');
  camBtn.onclick = () => {
    isCameraOn = !isCameraOn;
    if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = isCameraOn);
    camBtn.className = 'btn-icon' + (isCameraOn ? ' active' : '');
    camBtn.textContent = isCameraOn ? '📹' : '📷_off';
    updateLocalVideo();
  };
  controlBar.appendChild(camBtn);

  const screenBtn = el('button', { className: 'btn-icon', title: '共享屏幕' }, '🖥️');
  screenBtn.onclick = async () => {
    if (isScreenSharing) {
      stopScreenShare();
      screenBtn.className = 'btn-icon';
      return;
    }
    try {
      const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
      screenBtn.className = 'btn-icon active';
      isScreenSharing = true;
      const screenTrack = screenStream.getVideoTracks()[0];
      screenTrack.onended = () => { stopScreenShare(); screenBtn.className = 'btn-icon'; };
      // Replace video track on all peer connections
      for (const [peerId, pc] of pcMap) {
        const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
        if (sender) sender.replaceTrack(screenTrack);
      }
    } catch (e) { console.error('Screen share error:', e); }
  };
  function stopScreenShare() {
    isScreenSharing = false;
    if (localStream) {
      const videoTrack = localStream.getVideoTracks()[0];
      if (videoTrack) {
        for (const [peerId, pc] of pcMap) {
          const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
          if (sender) sender.replaceTrack(videoTrack);
        }
      }
    }
  }
  controlBar.appendChild(screenBtn);

  const recordBtn = el('button', { className: 'btn-icon', title: '录制' }, '⏺️');
  recordBtn.onclick = () => {
    if (isRecording) {
      stopRecording();
      recordBtn.className = 'btn-icon';
      recordBtn.innerHTML = '⏺️';
      return;
    }
    startRecording();
    recordBtn.className = 'btn-icon danger';
    recordBtn.innerHTML = '⏹️';
  };
  function startRecording() {
    if (!localStream) return;
    try {
      recordedChunks = [];
      const combinedStream = new MediaStream();
      localStream.getTracks().forEach(t => combinedStream.addTrack(t));
      // Try to include remote audio if available
      mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm;codecs=vp9' });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `meeting-${meeting.link}-${Date.now()}.webm`;
        a.click();
        URL.revokeObjectURL(url);
        alert('录制已保存！');
      };
      mediaRecorder.start();
      isRecording = true;
    } catch (e) { console.error('Record error:', e); alert('录制失败：' + e.message); }
  }
  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); }
    isRecording = false;
  }
  controlBar.appendChild(recordBtn);

  const participantsBtn = el('button', { className: 'btn-icon', title: '参会者' }, '👥');
  participantsBtn.onclick = () => {
    participantsOpen = !participantsOpen;
    document.getElementById('jm-participants').classList.toggle('open', participantsOpen);
  };
  controlBar.appendChild(participantsBtn);

  const chatBtn = el('button', { className: 'btn-icon', title: '聊天' }, '💬');
  chatBtn.onclick = () => {
    chatOpen = !chatOpen;
    document.getElementById('jm-chat').classList.toggle('open', chatOpen);
  };
  controlBar.appendChild(chatBtn);

  const hangupBtn = el('button', { className: 'btn-icon danger', title: '挂断' }, '📞');
  hangupBtn.onclick = () => {
    if (isHost && confirm('确定结束会议？所有参会者将被断开。')) {
      cleanup();
      Meetings.endMeeting(link);
      R.navigate('/dashboard');
    } else if (!isHost && confirm('确定离开会议？')) {
      cleanup();
      if (participant) Meetings.leaveMeeting(link, participant.id);
      R.navigate('/');
    }
  };
  controlBar.appendChild(hangupBtn);
  page.appendChild(controlBar);

  // Chat panel
  const chatPanel = el('div', { className: 'chat-panel', id: 'jm-chat' });
  chatPanel.innerHTML = `<div style="padding:16px;border-bottom:1px solid rgba(255,255,255,0.06);font-weight:600">💬 聊天</div>`;
  const chatMsgs = el('div', { className: 'chat-messages' });
  chatPanel.appendChild(chatMsgs);
  const chatInputArea = el('div', { className: 'chat-input-area' });
  const chatInp = el('input', { type: 'text', className: 'input', placeholder: '输入消息...', style: { flex: 1 } });
  chatInp.onkeydown = (e) => {
    if (e.key === 'Enter' && chatInp.value.trim()) {
      sendChat(chatInp.value.trim());
      chatInp.value = '';
    }
  };
  chatInputArea.appendChild(chatInp);
  chatInputArea.appendChild(el('button', { className: 'btn btn-primary btn-sm', onClick: () => { if (chatInp.value.trim()) { sendChat(chatInp.value.trim()); chatInp.value = ''; } } }, '发送'));
  chatPanel.appendChild(chatInputArea);
  page.appendChild(chatPanel);

  // Participants panel
  const pPanel = el('div', { className: 'participant-list', id: 'jm-participants' });
  pPanel.innerHTML = `<div style="padding:16px;border-bottom:1px solid rgba(255,255,255,0.06);font-weight:600">👥 参会者 (${meeting.participants.length + 1})</div>`;
  const pList = el('div', { style: 'padding:12px' });
  function refreshParticipants() {
    pList.innerHTML = '';
    const items = [{ name: myName + (isHost ? ' (主持人)' : ''), online: true, isMe: true }];
    meeting.participants.forEach(p => {
      if (!participant || p.id !== participant.id) {
        items.push({ name: p.name, online: true, isMe: false });
      }
    });
    items.forEach(p => {
      const row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', padding: '10px 12px', borderRadius: '8px', background: 'rgba(255,255,255,0.02)', marginBottom: '6px' } });
      row.innerHTML = `
        <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px">${p.name.charAt(0).toUpperCase()}</div>
        <span style="font-size:14px;flex:1">${p.name}</span>
        ${p.isMe ? '<span style="color:var(--green);font-size:11px">● 在线</span>' : '<span style="color:var(--green);font-size:11px">● 在线</span>'}
      `;
      pList.appendChild(row);
    });
  }
  refreshParticipants();
  pPanel.appendChild(pList);
  page.appendChild(pPanel);

  app.appendChild(page);

  function sendChat(text) {
    chatMessages.push({ sender: myName, text, time: Date.now() });
    renderChat();
    // Broadcast chat via BC
    if (bc) bc.postMessage({ type: 'chat', sender: myName, text });
  }

  function renderChat() {
    chatMsgs.innerHTML = '';
    chatMessages.forEach(m => {
      chatMsgs.appendChild(el('div', { className: 'chat-msg' },
        el('div', { className: 'sender' }, m.sender),
        el('div', { className: 'text' }, m.text)
      ));
    });
    chatMsgs.scrollTop = chatMsgs.scrollHeight;
  }

  function updateLocalVideo() {
    if (localStream) localVideo.srcObject = localStream;
  }

  // ─── WebRTC P2P via BroadcastChannel ─────────────────────
  const BC_CHANNEL = 'jm_meeting_' + link;

  async function initWebRTC() {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      localVideo.srcObject = localStream;
      updateLocalVideo();
    } catch (e) {
      console.error('Camera/mic error:', e);
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        localVideo.srcObject = localStream;
      } catch (e2) {
        alert('无法访问摄像头和麦克风，请检查权限设置');
      }
    }

    // Join BroadcastChannel
    bc = new BroadcastChannel(BC_CHANNEL);

    // Announce presence
    bc.postMessage({ type: 'join', peerId: myId, name: myName });

    bc.onmessage = async (ev) => {
      const msg = ev.data;
      if (msg.peerId === myId) return; // ignore self

      switch (msg.type) {
        case 'join':
          // New peer joined, create offer
          await createOffer(msg.peerId);
          break;
        case 'offer':
          await handleOffer(msg.peerId, msg.sdp);
          break;
        case 'answer':
          await handleAnswer(msg.peerId, msg.sdp);
          break;
        case 'ice-candidate':
          await handleIceCandidate(msg.peerId, msg.candidate);
          break;
        case 'leave':
          handlePeerLeave(msg.peerId);
          break;
        case 'chat':
          chatMessages.push({ sender: msg.sender, text: msg.text, time: Date.now() });
          renderChat();
          break;
        case 'request-offers':
          // New peer asking existing peers to send offers
          createOffer(msg.peerId);
          break;
      }
    };

    // Request existing peers to send offers
    bc.postMessage({ type: 'request-offers', peerId: myId });
  }

  async function createPeerConnection(peerId) {
    const pc = new RTCPeerConnection({
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }]
    });

    pc.onicecandidate = (e) => {
      if (e.candidate && bc) {
        bc.postMessage({ type: 'ice-candidate', peerId: myId, candidate: e.candidate });
      }
    };

    pc.ontrack = (e) => {
      if (e.streams && e.streams[0]) {
        remoteStreams.set(peerId, e.streams[0]);
        renderRemoteVideo(peerId, e.streams[0]);
      }
    };

    pc.onconnectionstatechange = () => {
      if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
        handlePeerLeave(peerId);
      }
    };

    // Add local tracks
    if (localStream) {
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    }

    pcMap.set(peerId, pc);
    return pc;
  }

  async function createOffer(peerId) {
    let pc = pcMap.get(peerId);
    if (!pc) pc = await createPeerConnection(peerId);

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    bc.postMessage({ type: 'offer', peerId: myId, sdp: pc.localDescription });
  }

  async function handleOffer(peerId, sdp) {
    let pc = pcMap.get(peerId);
    if (!pc) pc = await createPeerConnection(peerId);

    await pc.setRemoteDescription(new RTCSessionDescription(sdp));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    bc.postMessage({ type: 'answer', peerId: myId, sdp: pc.localDescription });
  }

  async function handleAnswer(peerId, sdp) {
    const pc = pcMap.get(peerId);
    if (pc && pc.signalingState !== 'stable') {
      await pc.setRemoteDescription(new RTCSessionDescription(sdp));
    }
  }

  async function handleIceCandidate(peerId, candidate) {
    const pc = pcMap.get(peerId);
    if (pc) {
      try {
        await pc.addIceCandidate(new RTCIceCandidate(candidate));
      } catch (e) { console.error('ICE candidate error:', e); }
    }
  }

  function handlePeerLeave(peerId) {
    const pc = pcMap.get(peerId);
    if (pc) { pc.close(); pcMap.delete(peerId); }
    remoteStreams.delete(peerId);
    removeRemoteVideo(peerId);
  }

  function renderRemoteVideo(peerId, stream) {
    let container = document.getElementById('remote-' + peerId);
    if (!container) {
      container = el('div', { className: 'video-container', id: 'remote-' + peerId });
      const video = el('video', { autoplay: true, playsinline: true, id: 'remote-video-' + peerId });
      container.appendChild(video);
      container.appendChild(el('div', { className: 'video-label' }, '参会者'));
      videoArea.appendChild(container);
    }
    const video = document.getElementById('remote-video-' + peerId);
    if (video) video.srcObject = stream;
  }

  function removeRemoteVideo(peerId) {
    const container = document.getElementById('remote-' + peerId);
    if (container) container.remove();
  }

  function cleanup() {
    if (bc) {
      bc.postMessage({ type: 'leave', peerId: myId });
      bc.close();
      bc = null;
    }
    for (const [id, pc] of pcMap) { pc.close(); }
    pcMap.clear();
    remoteStreams.clear();
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    if (isRecording) stopRecording();
  }

  // Handle page unload
  window.addEventListener('beforeunload', cleanup);

  // Start WebRTC
  initWebRTC().catch(console.error);
}

// ─── Init ───────────────────────────────────────────────────
R.init();
</script>
</body>
</html>
