<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>极简会议 Lite Meet — 一键召集，即刻开会 / Instant meetings, one click</title>
<link rel="icon" href="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef2f7;--bg2:#e2e8f0;--bg3:#ffffff;--bg4:#cbd5e1;
  --text:#1e293b;--text2:#475569;--text3:#64748b;--text4:#94a3b8;
  --blue:#378ADD;--blue2:#2563eb;--purple:#7F77DD;
  --green:#16a34a;--red:#dc2626;--yellow:#d97706;
  --radius:12px;--radius-sm:8px;
}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{min-height:100vh}

.btn{padding:12px 24px;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;box-shadow:0 4px 16px rgba(59,130,246,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(59,130,246,.4)}
.btn-primary:disabled{background:var(--bg4);box-shadow:none;transform:none;cursor:not-allowed;color:var(--text3)}
.btn-secondary{background:rgba(15,23,42,.08);border:1px solid rgba(15,23,42,.08);color:var(--text2)}
.btn-secondary:hover{background:rgba(15,23,42,.08)}
.btn-danger{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.25);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:var(--radius-sm)}
.btn-icon{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s;color:var(--text);background:rgba(15,23,42,.06)}
.btn-icon:hover{background:rgba(255,255,255,.15)}
.btn-icon.active{background:var(--blue)}
.btn-icon.danger{background:rgba(239,68,68,.3)}
.btn-icon.danger:hover{background:var(--red)}

.input{width:100%;padding:13px 16px;background:rgba(255,255,255,.85);border:1px solid var(--bg4);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.input::placeholder{color:var(--text4)}

.card{background:rgba(255,255,255,.7);border:1px solid rgba(15,23,42,.08);border-radius:var(--radius);padding:24px}
.card-glass{background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border:1px solid rgba(15,23,42,.06);border-radius:20px;padding:40px;box-shadow:0 25px 60px rgba(15,23,42,.08)}
.error-box{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);border-radius:var(--radius);padding:10px 14px;color:var(--red);font-size:13px;margin-bottom:20px}

.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-green{background:rgba(34,197,94,.1);color:var(--green)}
.badge-gray{background:rgba(100,116,139,.15);color:var(--text3)}

.page-center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.page-full{min-height:100vh;display:flex;flex-direction:column}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 32px;border-bottom:1px solid rgba(15,23,42,.08)}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;cursor:pointer}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px}

.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:20px;padding:6px 16px;font-size:13px;color:#93c5fd}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.hero-title{font-size:56px;font-weight:800;line-height:1.1;background:linear-gradient(135deg,var(--text),var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:18px;color:var(--text3);line-height:1.7;max-width:480px;margin:0 auto}
.feature-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;max-width:800px;margin:0 auto}
.feature-card{background:rgba(15,23,42,.04);border:1px solid rgba(15,23,42,.08);border-radius:var(--radius);padding:20px;text-align:center}
.feature-icon{font-size:28px;margin-bottom:8px}
.feature-title{font-size:14px;font-weight:600;margin-bottom:4px}
.feature-desc{font-size:12px;color:var(--text3)}

.meeting-video-area{flex:1;display:flex;flex-wrap:wrap;gap:12px;padding:16px;overflow-y:auto;align-content:flex-start;justify-content:center}
.video-container{position:relative;background:#1a1a2e;border-radius:var(--radius);overflow:hidden;min-width:280px;max-width:480px;flex:1 1 320px;aspect-ratio:4/3}
.video-container video{width:100%;height:100%;object-fit:cover}
.video-container .waiting{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:14px}
.video-label{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.6);color:#fff;padding:2px 10px;border-radius:6px;font-size:12px;z-index:2}
.control-bar{display:flex;justify-content:center;gap:16px;padding:16px 24px;background:rgba(255,255,255,.92);border-top:1px solid rgba(15,23,42,.08);flex-wrap:wrap}
.meeting-header{padding:12px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(15,23,42,.08);font-size:14px}

.chat-panel{position:fixed;right:0;top:0;bottom:0;width:320px;background:rgba(255,255,255,.96);border-left:1px solid rgba(15,23,42,.08);display:flex;flex-direction:column;z-index:100;transform:translateX(100%);transition:transform .3s}
.chat-panel.open{transform:translateX(0)}
.chat-messages{flex:1;overflow-y:auto;padding:16px}
.chat-input-area{padding:12px;border-top:1px solid rgba(15,23,42,.08);display:flex;gap:8px}
.chat-msg{margin-bottom:12px}
.chat-msg .sender{font-size:11px;color:var(--text3);margin-bottom:2px}
.chat-msg .text{font-size:13px;background:rgba(59,130,246,.15);padding:8px 12px;border-radius:var(--radius-sm);display:inline-block;max-width:100%;word-break:break-word}

.participant-list{position:fixed;right:0;top:0;bottom:0;width:280px;background:rgba(255,255,255,.96);border-left:1px solid rgba(15,23,42,.08);z-index:100;transform:translateX(100%);transition:transform .3s;overflow-y:auto}
.participant-list.open{transform:translateX(0)}

.conn-badge{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:200;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;transition:all .3s;pointer-events:none}
.conn-badge.ok{background:rgba(34,197,94,.15);color:var(--green)}
.conn-badge.wait{background:rgba(245,158,11,.15);color:var(--yellow)}
.conn-badge.err{background:rgba(239,68,68,.15);color:#fca5a5}

@media(max-width:768px){
  .hero-title{font-size:36px}
  .control-bar{gap:8px;padding:12px}
  .btn-icon{width:40px;height:40px;font-size:17px}
  .header{padding:12px 16px}
  .video-container{min-width:100%;max-width:100%}
  .chat-panel,.participant-list{width:100%}
}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s infinite}
.hidden{display:none!important}

/* ── 操作导引 overlay ── */
.guide-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.guide-modal{background:var(--bg3);border-radius:20px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 30px 80px rgba(15,23,42,.25);padding:28px}
.guide-modal h2{font-size:22px;font-weight:700;margin-bottom:4px}
.guide-sub{color:var(--text3);font-size:13px;margin-bottom:18px}
.guide-step{display:flex;gap:14px;align-items:flex-start;padding:12px;background:rgba(59,130,246,.06);border-radius:12px;margin-bottom:10px}
.guide-step .gi{flex:0 0 40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--blue2));display:flex;align-items:center;justify-content:center;color:#fff}
.guide-step .gt{font-size:14px;font-weight:600;margin-bottom:2px}
.guide-step .gd{font-size:12px;color:var(--text3);line-height:1.5}
.guide-tip{background:rgba(217,119,6,.1);border:1px solid rgba(217,119,6,.25);border-radius:12px;padding:14px;font-size:12px;color:var(--text2);line-height:1.7;margin:14px 0}
.guide-tip b{color:var(--text)}
.guide-actions{display:flex;gap:12px;margin-top:18px}
.guide-check{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);margin-top:14px;cursor:pointer}
.btn-help{color:var(--blue);background:rgba(59,130,246,.12)}
.btn-help:hover{background:rgba(59,130,246,.2)}
</style>

<body>
<div id="app"></div>

<script src="config.js"></script>
<script src="peerjs.min.js?v=2"></script>
<script>
/* ============================================================
   极简会议 v5.0 — PeerJS 云信令 + P2P WebRTC
   无账号系统：输入名字即可创建/加入会议
   零服务器 · 跨设备 · P2P 端到端加密
   ============================================================ */

const Store = {
  get(key, fallback) { try { const v = localStorage.getItem('jm_' + key); return v ? JSON.parse(v) : (fallback === undefined ? null : fallback); } catch { return fallback === undefined ? null : fallback; } },
  set(key, val) { localStorage.setItem('jm_' + key, JSON.stringify(val)); },
  remove(key) { localStorage.removeItem('jm_' + key); }
};

function generateLink() {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let s = '';
  for (let i = 0; i < 8; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

function getHashQuery() {
  const hash = window.location.hash.slice(1);
  const qIdx = hash.indexOf('?');
  return qIdx === -1 ? new URLSearchParams() : new URLSearchParams(hash.slice(qIdx + 1));
}

function buildShareUrl(link, title, hostName) {
  let u = window.location.origin + window.location.pathname + '#/join/' + link + '?t=' + encodeURIComponent(title || '未命名会议') + '&n=' + encodeURIComponent(hostName || '主持人');
  const b = window.__MEETING_BACKEND__ || '';
  if (b) u += '&backend=' + encodeURIComponent(b);
  return u;
}
// 后端基地址（登录/注册等 API 请求用）：默认同源，部署在 Netlify 时由 config.js 指向信令服务器
const API_BASE = window.__MEETING_BACKEND__ || '';
// 信令/后端地址解析：优先级 链接?backend= > config.js > 同源
function resolveBackend() {
  try { const qb = R.query.get('backend'); if (qb) return qb; } catch (e) {}
  return window.__MEETING_BACKEND__ || '';
}

function peerId(link, role) { return 'jm-' + link + '-' + role.replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 30); }

const R = {
  current: null, params: {}, query: new URLSearchParams(), _lastKey: null,
  navigate(hash) { window.location.hash = hash; this._render(); },
  _parse() {
    const h = window.location.hash.slice(1) || '/';
    const qIdx = h.indexOf('?');
    const pathPart = qIdx === -1 ? h : h.slice(0, qIdx);
    const parts = pathPart.split('/').filter(Boolean);
    this.current = parts[0] || '/';
    this.params = {};
    if (parts.length > 1 && (this.current === 'join' || this.current === 'meeting')) this.params.link = parts[1];
    this.query = qIdx === -1 ? new URLSearchParams() : new URLSearchParams(h.slice(qIdx + 1));
  },
  _render() {
    this._parse();
    // 关键修复：navigate() 设置 hash 后会同时触发 hashchange 再调一次 _render，
    // 若不做去重，房间组件会被挂载两次 → 两个 init() → 两个 peer 用同一 clientUid 派生 ID → unavailable-id 冲突
    const key = this.current + '|' + (this.params.link || '') + '|' + this.query.toString();
    if (key === this._lastKey) return;
    this._lastKey = key;
    const app = document.getElementById('app');
    switch (this.current) {
      case '/': renderLanding(app); break;
      case 'create': renderCreate(app); break;
      case 'join': renderJoin(app); break;
      case 'meeting': renderMeeting(app); break;
      case 'login': renderLogin(app); break;
      case 'register': renderRegister(app); break;
      default: renderLanding(app);
    }
  },
  init() { window.addEventListener('hashchange', () => this._render()); this._render(); }
};

// ── 登录态 ──
function isLoggedIn() { return !!Store.get('auth_token'); }
function getCurUser() { return Store.get('current_user'); }
function getToken() { return Store.get('auth_token'); }
function doLogout() { Store.remove('auth_token'); Store.remove('current_user'); R.navigate('/'); }

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (!attrs) attrs = {};
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') e.className = v;
    else if (k === 'innerHTML') { e.innerHTML = v; continue; }
    else e.setAttribute(k, v);
  }
  for (const c of children) { if (typeof c === 'string') e.appendChild(document.createTextNode(c)); else if (c instanceof Node) e.appendChild(c); }
  return e;
}

// ─── Join Page ──────────────────────────────────────────────
function renderJoin(app) {
  // If link is in params, show join form for that meeting
  // If no link, show a form to paste a link
  const link = R.params.link;
  const q = R.query;
  const title = q.get('t') || '未命名会议';
  const hostName = q.get('n') || '主持人';

  app.innerHTML = '';
  const page = el('div', { className: 'page-center' });
  const card = el('div', { className: 'card-glass', style: { width: '460px', maxWidth: '100%', textAlign: 'center' } });

  if (link) {
    // Direct join via link
    card.innerHTML = '<div style="font-size:48px;margin-bottom:20px;color:var(--blue)">' + IC.logo.replace('width="18"','width="48"').replace('height="18"','height="48"') + '</div><h1 style="font-size:26px;font-weight:700;margin-bottom:8px">加入会议 Join meeting</h1><p style="color:var(--text3);font-size:14px;margin-bottom:36px;line-height:1.6">会议 Meeting：<b>' + (title || '未命名会议') + '</b><br>主持人 Host：' + hostName + '<br>输入姓名即可加入 · Enter your name to join</p>';
    const form = el('form'); form.onsubmit = (e) => { e.preventDefault(); doJoin(); };
    const nameInp = el('input', { type: 'text', className: 'input', placeholder: '请输入您的姓名 · Your name', required: true, style: { textAlign: 'center', fontSize: '16px', padding: '16px', marginBottom: '24px', border: '2px solid var(--bg4)', borderRadius: '12px', fontWeight: 500 } });
    form.appendChild(nameInp);
    const joinBtn = el('button', { type: 'submit', className: 'btn btn-primary', style: { width: '100%', padding: '16px', fontSize: '18px', fontWeight: 700 } }, '加入会议 Join');
    joinBtn.disabled = true; nameInp.oninput = () => { joinBtn.disabled = !nameInp.value.trim(); };
    form.appendChild(joinBtn); card.appendChild(form);
    function doJoin() {
      const name = nameInp.value.trim(); if (!name) return;
      joinBtn.textContent = '加入中... Joining...'; joinBtn.disabled = true;
      setTimeout(() => {
        Store.set('current_name', name);
        Store.set('current_meeting_link', link);
        Store.set('current_meeting_title', title);
        Store.set('current_is_host', false);
        const _bk2 = q.get('backend') ? '&backend=' + encodeURIComponent(q.get('backend')) : (window.__MEETING_BACKEND__ ? '&backend=' + encodeURIComponent(window.__MEETING_BACKEND__) : '');
        R.navigate('/meeting/' + link + '?t=' + encodeURIComponent(title) + '&n=' + encodeURIComponent(hostName) + _bk2);
      }, 300);
    }
  } else {
    // No link - paste a link
    card.innerHTML = '<div style="font-size:48px;margin-bottom:20px;color:var(--blue)">' + IC.logo.replace('width="18"','width="48"').replace('height="18"','height="48"') + '</div><h1 style="font-size:26px;font-weight:700;margin-bottom:8px">加入会议 Join meeting</h1><p style="color:var(--text3);font-size:14px;margin-bottom:36px">粘贴主持人分享给你的会议链接 · Paste the meeting link you received</p>';
    const form = el('form'); form.onsubmit = (e) => { e.preventDefault(); doParse(); };
    const linkInp = el('input', { type: 'text', className: 'input', placeholder: '粘贴会议链接... · Paste meeting link...', required: true, style: { marginBottom: '24px', fontSize: '13px' } });
    form.appendChild(linkInp);
    const errBox = el('div', { className: 'error-box hidden' }); form.appendChild(errBox);
    const submitBtn = el('button', { type: 'submit', className: 'btn btn-primary', style: { width: '100%', padding: '14px', fontSize: '15px' } }, '下一步 Next');
    form.appendChild(submitBtn); card.appendChild(form);
    function doParse() {
      const val = linkInp.value.trim();
      if (!val) return;
      // Extract hash from URL
      const hashMatch = val.match(/#\/join\/([a-z0-9]+)(\?.*)?$/);
      if (hashMatch) {
        window.location.hash = '/join/' + hashMatch[1] + (hashMatch[2] || '');
      } else if (/^[a-z0-9]{6,12}$/.test(val)) {
        R.navigate('/join/' + val);
      } else {
        errBox.textContent = '无法识别的链接格式，请粘贴完整的会议链接 / Unrecognized link, paste the full meeting link';
        errBox.classList.remove('hidden');
      }
    }
  }
  card.appendChild(el('p', { style: { color: 'var(--text4)', textAlign: 'center', marginTop: '24px', fontSize: '14px' } }, '没有链接？No link? ', el('a', { href: '#/create', style: { color: 'var(--blue)', textDecoration: 'none', fontWeight: 500 } }, '创建一个会议 Create one')));
  page.appendChild(card); app.appendChild(page);
}

// ─── Meeting Room (PeerJS + WebRTC) ─────────────────────────

  function broadcastRoster() {
    if (!amAnchor) return;
    const ids = Array.from(new Set([myPeerId, ...Object.keys(roster)]));
    for (const [pid, dc] of Object.entries(dcMap)) { try { dc.send({ type: 'roster', ids }); } catch (e) {} }
  }
  function handleRoster(ids) {
    ids.forEach(i => { if (i !== myPeerId) { roster[i] = roster[i] || i; callPeer(i, 'participant', i); } });
    renderParticipants();
  }
  function sendChat(text) { chatMessages.push({ sender: myName, text, time: Date.now() }); renderChat(); broadcastChat(text); }
  function renderChat() { chatMsgs.innerHTML = ''; chatMessages.forEach(m => { chatMsgs.appendChild(el('div', { className: 'chat-msg' }, el('div', { className: 'sender' }, m.sender), el('div', { className: 'text' }, m.text))); }); chatMsgs.scrollTop = chatMsgs.scrollHeight; }
  function broadcastChat(text) { for (const [pid, dc] of Object.entries(dcMap)) { try { dc.send({ type: 'chat', sender: myName, text }); } catch (e) {} } }

  function updateBadge(status) {

    if (status === 'ok') { connBadge.innerHTML = IC.check + ' 已连接 · P2P 直连 / Connected'; setTimeout(() => { if (Object.keys(connections).length > 0) connBadge.classList.add('hidden'); }, 3000); }
    else if (status === 'wait') connBadge.innerHTML = IC.plug + ' 连接信令中... Connecting...';
    else connBadge.innerHTML = IC.hangup + ' 连接断开，正在重连... Reconnecting...';

  app.appendChild(page);

  // ─── PeerJS ──────────────────────────────────────────────
  // 会议信令/连接参数（模块内共用）
  // 信令服务器地址：默认同源(window.location)，部署在 Netlify 时由 resolveBackend() 指向后端隧道
  const BACKEND = resolveBackend();
  let _bUrl = null;

  const isSecure = _bUrl ? (_bUrl.protocol === 'https:') : (location.protocol === 'https:');

  const anchorId = peerId(link, 'host');   // 全员争抢的“锚点”ID：谁先抢到谁当协调者
  // 参会者ID改为“按浏览器稳定”，而非每次刷新随机：同一人重连/自愈复用同一ID，

  function clientUid() {

  // ─── 入会前浮层（创建即进房：表单内联在房间内，不再有独立表单页）───
  function maybeStart() {

  function showPreJoin() {
    const ov = el('div', { id: 'jm-prejoin', style: { position: 'fixed', inset: 0, zIndex: 50, background: 'rgba(15,23,42,.82)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' } });
    const card = el('div', { className: 'card-glass', style: { width: '440px', maxWidth: '100%', padding: '32px', textAlign: 'center' } });
    card.innerHTML = '<div class="logo" style="justify-content:center;margin-bottom:20px"><div class="logo-icon">' + IC.logo + '</div></div>' +
      '<h1 style="font-size:22px;font-weight:700;margin-bottom:6px">' + (isHost ? '创建会议 Create meeting' : '加入会议 Join meeting') + '</h1>' +
      '<p style="color:var(--text3);font-size:14px;margin-bottom:24px">' + (isHost ? '填写信息，立即进入 · Fill in and enter now' : '输入你的名字加入 · Enter your name to join') + '</p>';
    const form = el('form'); form.onsubmit = (e) => { e.preventDefault(); go(); };
    form.appendChild(el('label', { style: { color: 'var(--text2)', display: 'block', marginBottom: '8px', fontSize: '13px', fontWeight: 500, textAlign: 'left' } }, '你的名字 Your name'));
    const nameInp = el('input', { type: 'text', className: 'input', placeholder: isHost ? '例如：张三 · e.g. Alex' : '请输入您的姓名 · Your name', required: true, value: (isHost ? (getCurUser() || '') : ''), style: { marginBottom: isHost ? '16px' : '24px' } });
    form.appendChild(nameInp);
    let titleInp = null;
    if (isHost) {
      form.appendChild(el('label', { style: { color: 'var(--text2)', display: 'block', marginBottom: '8px', fontSize: '13px', fontWeight: 500, textAlign: 'left' } }, '会议标题（可选）Meeting title (optional)'));
      titleInp = el('input', { type: 'text', className: 'input', placeholder: '例如：周会复盘 · e.g. Weekly sync', style: { marginBottom: '24px' } });
      form.appendChild(titleInp);
    }
    const submitBtn = el('button', { type: 'submit', className: 'btn btn-primary', style: { width: '100%', padding: '14px', fontSize: '15px' } }, isHost ? '创建并进入会议 Create & enter' : '加入会议 Join');
    form.appendChild(submitBtn);

    ov.appendChild(card);

    setTimeout(() => { try { nameInp.focus(); } catch (e) {} }, 50);
    function go() {

      const ti = isHost ? (titleInp ? titleInp.value.trim() : '') : (q.get('t') || '');
      Store.set('current_name', nm);

      if (isHost) {
        const recent = Store.get('recent_meetings', []);
        recent.unshift({ link: link, title: title, hostName: nm, createdAt: new Date().toISOString() });
        Store.set('recent_meetings', recent.slice(0, 10));

      ov.remove();

  }

  async function init() {
    if (roomStarted) return; roomStarted = true;   // 双保险：即使路由去重失效也只初始化一次
    // 获取本地媒体；摄像头不可用时自动降级为动态占位流，保证“自己跟自己”自测也有画面、不再黑屏
    localStream = await getLocalMedia();
    localVideo.srcObject = localStream;
    // 入口：所有人一律先尝试抢占锚点。第一个抢到的人当协调者（人人可主持），
    // 其余人自动转为参会者并连上锚点；锚点离开后其他人自动接管（自愈，会议不散）。
    updateBadge('wait');
    claimAnchor([]);
  }

  // 获取本地摄像头/麦克风；失败时降级为带时标的动态占位视频流，确保 P2P 两端都能显示画面（自测/无设备也不黑屏）
  async function getLocalMedia() {
    try {
      return await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    } catch (e) {
      console.warn('[media] 摄像头/麦克风不可用，降级为占位视频流', e);
    }
    try {
      const a = await navigator.mediaDevices.getUserMedia({ audio: true });
      const cv = makeCanvasStream();
      cv.getAudioTracks().forEach(t => a.addTrack(t));
      return a;
    } catch (e2) {
      return makeCanvasStream();
    }
  }

  // 生成带动态时标的占位视频流（无摄像头时复用，证明 P2P 视频通道打通且两端都有画面）
  function makeCanvasStream() {
    const cv = document.createElement('canvas');
    cv.width = 640; cv.height = 480;
    const ctx = cv.getContext('2d');
    let frame = 0;
    (function draw() {
      frame++;
      ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, 640, 480);
      ctx.fillStyle = '#38bdf8'; ctx.font = '26px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText((myName || '我 Me') + ' · 本地自测画面 Self-test', 320, 210);
      ctx.fillStyle = '#94a3b8'; ctx.font = '18px sans-serif';
      ctx.fillText(new Date().toLocaleTimeString(), 320, 255);
      ctx.fillStyle = '#64748b'; ctx.font = '14px sans-serif';
      ctx.fillText('P2P video self-check · ' + frame, 320, 295);
      requestAnimationFrame(draw);
    })();
    try { return cv.captureStream(15); } catch (e) { try { return cv.captureStream(); } catch (e2) { return new MediaStream(); } }
  }

  // 给 peer 绑定通用事件（无论我当前是锚点还是参会者都需要）
  function wirePeer(p) {
    p.on('call', (call) => {
      // 去重：同一参会者只保留一个媒体连接，杜绝“同一人的两个画面”
      if (calls[call.peer] || incoming.has(call.peer) || dialing.has(call.peer)) {
        try { call.close(); } catch (e) {}
        return;
      }
      incoming.add(call.peer);
      // 容量控制：仅锚点判定；已满且是新成员则拒绝，并通知对方
      if (amAnchor && !roster[call.peer]) {
        const cur = 1 + Object.keys(roster).length;   // 含自己
        if (cur >= MAX_PEERS) {
          console.warn('[PeerJS] 会议已满(' + cur + '/' + MAX_PEERS + ')，拒绝', call.peer);
          try {
            const notice = p.connect(call.peer);
            if (notice) { notice.on('open', () => { try { notice.send({ type: 'meeting-full', max: MAX_PEERS }); } catch (e) {} setTimeout(() => { try { notice.close(); } catch (e) {} }, 500); }); }
          } catch (e) {}
          setTimeout(() => { try { call.close(); } catch (e) {} }, 300);
          return;
        }
      }
      call.answer(localStream);
      const callerName = call.metadata ? call.metadata.name : '参会者';
      const callerRole = call.metadata ? call.metadata.role : 'participant';
      renderRemoteVideo(call.peer, null, callerName);   // 先占位一张 tile，流到达后自动更新（移动端改善“看不到别人”）
      roster[call.peer] = callerName; if (amAnchor) { broadcastRoster(); } renderParticipants();
      call.on('stream', (remoteStream) => {
        incoming.delete(call.peer);
        calls[call.peer] = { call, stream: remoteStream, name: callerName };
        connections[call.peer] = { name: callerName, connected: true, role: callerRole };
        renderRemoteVideo(call.peer, remoteStream, callerName);
        renderParticipants();
      });
      call.on('close', () => {
        incoming.delete(call.peer);
        removeRemoteVideo(call.peer);
        delete calls[call.peer];
        delete connections[call.peer];
        if (amAnchor) { delete roster[call.peer]; broadcastRoster(); }
        renderParticipants();
        maybeReclaimAnchor(call.peer);
      });
      call.on('error', (err) => { incoming.delete(call.peer); console.error('[PeerJS] Call error:', err); });
    });

    p.on('connection', (conn) => {
      dcMap[conn.peer] = conn;
      conn.on('data', (data) => {
        if (data.type === 'chat') { chatMessages.push({ sender: data.sender, text: data.text, time: Date.now() }); renderChat(); }
        else if (data.type === 'participant-info') {
          connections[conn.peer] = { name: data.name, connected: true, role: data.role };
          roster[conn.peer] = data.name; if (amAnchor) broadcastRoster(); renderParticipants();
          renderParticipants();
        }
        else if (data.type === 'roster') { handleRoster(data.ids); }
        else if (data.type === 'meeting-full') {
          alert('会议人数已满（上限 ' + (data.max || MAX_PEERS) + ' 人），暂时无法加入。请稍后再试或联系主持人。\nMeeting is full (max ' + (data.max || MAX_PEERS) + '). Please try again later or contact the host.');
          try { cleanup(); } catch (e) {}
          R.navigate('/');
        }
        else if (data.type === 'end-meeting') {
          meetingEnded = true;
          try { cleanup(); } catch (e) {}
          showEndedScreen();
        }
      });
      conn.on('open', () => { conn.send({ type: 'participant-info', name: myName, role: myRole }); });
      conn.on('close', () => { delete dcMap[conn.peer]; });
      conn.on('error', (e) => { console.error('[PeerJS] DataChannel error:', conn.peer, e); });
    });

    p.on('disconnected', () => { updateBadge('err'); try { p.reconnect(); } catch (e) {} });

    p.on('error', (err) => {
      console.warn('[PeerJS] error type=' + (err && err.type) + ' msg=' + (err && err.message));
      if (err.type === 'peer-unavailable') {
        // 目标暂不在线：参会者重试连锚点；若锚点整体掉线则尝试自愈接管
        if (!amAnchor) {
          setTimeout(() => { if (!calls[anchorId] && !dcMap[anchorId]) connectToAnchor(); }, 1500);
          maybeReclaimAnchor(anchorId);
        }
      } else if (err.type !== 'unavailable-id') {
        // unavailable-id 交由 claimAnchor 处理；其它错误提示重连
        updateBadge('err');
      }
    });
  }

  function connectToAnchor() {
    if (amAnchor || meetingEnded) return;
    if (!calls[anchorId]) callPeer(anchorId, 'host', hostName);
  }

  // 尝试占用锚点 ID：成功=我当协调者；失败(unavailable-id)=锚点仍被本浏览器陈旧会话占用
  // (刷新/重开浏览器时常见，旧 socket 尚未从信令服务器释放)。此时不立即降级，
  // 而是等待其超时后以退避重试同一锚点 ID，让“主持人刷新后仍能拿回自己房间”。
  // 多次重试仍失败（确有他人占用）才转为参会者。
  const ANCHOR_MAX = 6;
  function claimAnchor(seedIds, attempt) {
    attempt = attempt || 0;
    myPeerId = anchorId;
    amAnchor = false;
    peer = new Peer(anchorId, peerOpts());
    wirePeer(peer);
    peer.on('open', () => {
      amAnchor = true;
      console.log('[PeerJS] 我是锚点(协调者):', anchorId);
      updateBadge('ok');
      // 接管场景：把已知成员重新拉起来，恢复网状
      (seedIds || []).forEach(id => {
        if (id !== myPeerId) {
          roster[id] = (connections[id] && connections[id].name) || (roster[id] || '参会者');
          callPeer(id, 'participant', id);
        }
      });
      broadcastRoster();
      renderParticipants();
    });
    peer.on('error', (err) => {
      if (err.type === 'unavailable-id') {
        console.warn('[PeerJS] 锚点ID被占用，等待重试/转参会者 (attempt ' + attempt + ')');
        try { peer.destroy(); } catch (e) {}
        if (!meetingEnded && attempt < ANCHOR_MAX) {
          const backoff = 1000 * (attempt + 1);
          setTimeout(() => { if (!meetingEnded && !amAnchor) claimAnchor(seedIds, attempt + 1); }, backoff);
        } else {
          becomeParticipant(seedIds);
        }
      }
    });
  }

  // 参会者连接：ID 默认取“按浏览器稳定”的 partId。若该 ID 仍被本浏览器陈旧会话占用
  // (刷新/重开常见)，则等待信令超时后以退避重试同一稳定 ID；多次仍失败（如同浏览器多标签）
  // 改用带会话随机后缀的唯一 ID 兜底，确保任何情况下都能连上而不会卡死。
  function freshPartId() {
    return 'jm-' + link + '-p-' + clientUid() + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
  }
  let partRetries = 0;
  function startParticipant(seedIds, unique) {
    amAnchor = false;
    myPeerId = unique ? freshPartId() : partId;
    peer = new Peer(myPeerId, peerOpts());
    wirePeer(peer);
    peer.on('open', () => {
      updateBadge('ok');
      connectToAnchor();
      (seedIds || []).forEach(id => { if (id !== myPeerId && id !== anchorId && !calls[id]) callPeer(id, 'participant', id); });
    });
    peer.on('error', (err) => {
      if (err.type === 'unavailable-id' && !unique && !meetingEnded) {
        console.warn('[PeerJS] 参会者ID被占用，重试/改用唯一ID (attempt ' + partRetries + ')');
        try { peer.destroy(); } catch (e) {}
        if ((partRetries = partRetries + 1) <= 6) {
          setTimeout(() => { if (!meetingEnded && !amAnchor) startParticipant(seedIds, false); }, 1000 * partRetries);
        } else {
          partRetries = 0;
          startParticipant(seedIds, true);   // 兜底：唯一 ID，避免卡死
        }
      }
    });
  }
  function becomeParticipant(seedIds) { partRetries = 0; startParticipant(seedIds, false); }

  // 自愈：锚点离开后，参会者带抖动争抢锚点 ID 接管协调（第一个抢到的接管，会议不散）
  let reclaiming = false;
  function maybeReclaimAnchor(goneId) {
    if (meetingEnded) return;
    if (amAnchor || reclaiming) return;
    if (goneId !== anchorId) return;   // 仅当“锚点”掉线才触发接管
    reclaiming = true;
    const jitter = 400 + Math.floor(Math.random() * 1600);
    setTimeout(() => {
      reclaiming = false;
      if (amAnchor) return;
      const seedIds = Object.keys(connections).filter(id => id !== anchorId);
      console.log('[PeerJS] 锚点掉线，尝试接管…');
      try { peer.destroy(); } catch (e) {}
      claimAnchor(seedIds);
    }, jitter);
  }

  function callPeer(remotePeerId, role, displayName) {
    if (calls[remotePeerId] || dialing.has(remotePeerId) || meetingEnded) return;
    console.log('[PeerJS] callPeer ->', remotePeerId, role);

    const call = peer.call(remotePeerId, localStream, {
      metadata: { name: myName, role: myRole }
    });

    if (!call) { console.warn('[PeerJS] call() returned null for', remotePeerId); return; }
    dialing.add(remotePeerId);

    call.on('stream', (remoteStream) => {
      console.log('[PeerJS] Received stream from:', remotePeerId);
      dialing.delete(remotePeerId);
      calls[remotePeerId] = { call, stream: remoteStream, name: displayName };
      connections[remotePeerId] = { name: displayName, connected: true, role };
      renderRemoteVideo(remotePeerId, remoteStream, displayName);
      renderParticipants();
    });

    call.on('close', () => {
      dialing.delete(remotePeerId);
      removeRemoteVideo(remotePeerId);
      delete calls[remotePeerId];
      delete connections[remotePeerId];
      renderParticipants();
      maybeReclaimAnchor(remotePeerId);   // 若断的是锚点，尝试自愈接管
    });

    call.on('error', (err) => {
      console.error('[PeerJS] Call error to', remotePeerId, ':', err);
      dialing.delete(remotePeerId);
      setTimeout(() => {
        if (!calls[remotePeerId] && !meetingEnded) callPeer(remotePeerId, role, displayName);
      }, 2000);
    });

    // Open DataChannel for chat
    if (!dcMap[remotePeerId]) {
      const dc = peer.connect(remotePeerId, { reliable: true });
      dc.on('open', () => {
        console.log('[PeerJS] DataChannel open to:', remotePeerId);
        dcMap[remotePeerId] = dc;
        dc.send({ type: 'participant-info', name: myName, role: myRole });
      });
      dc.on('data', (data) => {
        if (data.type === 'chat') { chatMessages.push({ sender: data.sender, text: data.text, time: Date.now() }); renderChat(); }
        else if (data.type === 'participant-info') {
          connections[remotePeerId] = { name: data.name, connected: true, role: data.role };
          renderParticipants();
        }
        else if (data.type === 'end-meeting') { meetingEnded = true; try { cleanup(); } catch (e) {} showEndedScreen(); }
      });
      dc.on('close', () => { console.log('[PeerJS] DataChannel close to:', remotePeerId); delete dcMap[remotePeerId]; maybeReclaimAnchor(remotePeerId); });
      dc.on('error', (e) => { console.error('[PeerJS] DataChannel error to:', remotePeerId, e); });
    }
  }

  function renderRemoteVideo(pid, stream, name) {
    let container = document.getElementById('remote-' + pid);
    if (!container) {
      container = el('div', { className: 'video-container fade-in', id: 'remote-' + pid });
      container.style.position = 'relative';
      const video = el('video', { autoplay: true, playsinline: true, id: 'remote-video-' + pid });
      container.appendChild(video);
      container.appendChild(el('div', { className: 'video-label' }, name || '参会者'));
      videoArea.appendChild(container);
    }
    const video = document.getElementById('remote-video-' + pid);
    if (video) { video.srcObject = stream; if (video.play) { video.play().catch(function(){}); } }
    // 无视频轨（对方未开摄像头或自测占位）时显示提示，避免一片黑屏导致误判“连接失败”
    const hasVideo = !!(stream && stream.getVideoTracks && stream.getVideoTracks().length > 0);
    let ph = container.querySelector('.remote-placeholder');
    if (!hasVideo) {
      if (!ph) {
        ph = el('div', { className: 'remote-placeholder', style: 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#94a3b8;background:rgba(15,23,42,.55);font-size:14px' }, '对方摄像头未开启 · Camera off');
        container.appendChild(ph);
      }
    } else if (ph) { ph.remove(); }
  }

  function removeRemoteVideo(pid) {
    const container = document.getElementById('remote-' + pid);
    if (container) container.remove();
  }

  function cleanup() {
    if (peer) {
      for (const [cid, c] of Object.entries(calls)) { try { c.call.close(); } catch (e) {} }
      for (const [pid, dc] of Object.entries(dcMap)) { try { dc.close(); } catch (e) {} }
      peer.destroy();
      peer = null;
    }
    calls = {}; dcMap = {}; connections = {};
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    if (isRecording) stopRec();
  }

  // 向所有已建立的 DataChannel 广播（主持人结束会议用）
  function broadcastMsg(obj) { for (const [pid, dc] of Object.entries(dcMap)) { try { dc.send(obj); } catch (e) {} } }

  // 主持人结束会议：广播给所有人→全员退出并显示“已结束”；结束后阻止自愈重连
  function endMeeting() {
    if (meetingEnded) return;
    if (amAnchor) { broadcastMsg({ type: 'end-meeting' }); }
    meetingEnded = true;
    try { cleanup(); } catch (e) {}
    showEndedScreen();
  }

  function showEndedScreen() {
    app.innerHTML = '';
    const wrap = el('div', { className: 'page-center' });
    const card = el('div', { className: 'card-glass', style: { textAlign: 'center', padding: '48px', maxWidth: '460px' } });
    card.innerHTML = '<div style="font-size:48px;margin-bottom:16px;color:var(--green)">✓</div>' +
      '<h1 style="font-size:24px;font-weight:700;margin-bottom:8px">会议已结束 · Meeting ended</h1>' +
      '<p style="color:var(--text3);font-size:14px;margin-bottom:32px;line-height:1.6">主持人已结束本次会议，所有参会者已退出。<br>The host has ended this meeting; all participants have left.</p>';
    const back = el('button', { className: 'btn btn-primary', style: { padding: '12px 32px' } }, '返回首页 Back home');
    back.onclick = () => R.navigate('/');
    card.appendChild(back);
    wrap.appendChild(card); app.appendChild(wrap);
  }

  // 顶部状态徽章如实反映会议状态（不再写死“进行中”）
  function updateLiveBadge() {
    const badge = mh.querySelector('.badge');
    if (!badge) return;
    const dot = '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor"></span>';
    if (meetingEnded) {
      badge.className = 'badge'; badge.style.background = 'rgba(100,116,139,.15)'; badge.style.color = '#94a3b8';
      badge.innerHTML = dot + ' 已结束 Ended'; return;
    }
    const others = Object.keys(connections).filter(id => id !== myPeerId).length;
    if (others > 0) {
      badge.className = 'badge badge-green pulse'; badge.style.background = ''; badge.style.color = '';
      badge.innerHTML = dot + ' 进行中 Live';
    } else {
      badge.className = 'badge'; badge.style.background = 'rgba(234,179,8,.15)'; badge.style.color = '#eab308';
      badge.innerHTML = dot + ' 等待中 Waiting';
    }
  }

  window.addEventListener('beforeunload', cleanup);
  window.addEventListener('pagehide', cleanup);   // 移动端刷新/切后台更可靠地释放信令 ID，避免陈旧会话占用
  if (!Store.get('guide_seen')) setTimeout(() => showGuideOverlay(), 900);
  maybeStart();
}

// ─── Start ─────────────────────────────────────────────────
R.init();
</script>
</body>
</html>
