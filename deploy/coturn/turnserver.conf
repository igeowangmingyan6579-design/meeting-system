# coturn TURN 中继配置 — 移动端 / 严格 NAT 穿透
# 与前端 dist 中注入的凭证一致：username=meeting  password=<下方 secret>

listening-ip=0.0.0.0
listening-port=3478
tls-listening-port=5349

# ↓↓↓ 必须改成你的 VPS 公网 IP（否则中继不通，移动端连不上）↓↓↓
external-ip=EXTERNAL_IP_HERE
relay-ip=EXTERNAL_IP_HERE

relay-threads=4
min-port=49000
max-port=49500

# TURN 长期凭证（与 dist 注入的一致）
user=meeting:TURN_SECRET_HERE
realm=meeting.local

lt-cred-mech
no-loopback-peers
verbose
