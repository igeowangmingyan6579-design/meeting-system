# 极简会议 — Nginx 配置（HTTPS + 静态前端 + /peerjs 反代）
# 注意：证书路径为 ./certs/fullchain.pem 与 ./certs/privkey.pem
# 申请方式见 README.md（certbot）

# HTTP -> HTTPS 强制跳转
server {
    listen 80;
    server_name _;
    # certbot 校验用（申请证书时临时放开，平时可注释）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 前端静态文件（dist）
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA：所有路由回退到 index.html（本项目用 hash 路由，此项主要兜底）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PeerJS 信令反代（WebSocket + 长轮询，必须带 Upgrade 头）
    location /peerjs {
        proxy_pass http://peerjs:9000/peerjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
